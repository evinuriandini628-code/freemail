<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MatMailer - Email Sementara</title>
    <meta name="mail-domains" content="">
    <link rel="preload" href="/html/app.html" as="fetch" crossorigin>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/app-sidebar.css" />
    <link rel="stylesheet" href="/css/app-mailbox.css" />
    <link rel="stylesheet" href="/css/app-compose.css" />
    <link rel="stylesheet" href="/css/app-modal.css" />
    <link rel="stylesheet" href="/css/app-responsive.css" />
    <link rel="stylesheet" href="/css/app-mobile.css" media="(max-width: 900px)" />
    <link rel="stylesheet" href="/css/matmailer.css" />
    <script src="/js/theme-toggle.js"></script>
    <link rel="preload" href="/icons/sprites.svg" as="image" type="image/svg+xml" crossorigin>
    <script src="/js/toast-utils.js"></script>
    <script src="/js/mock.js"></script>
    <script>try{ if (location.hash){ sessionStorage.setItem('mf:preservedHash', location.hash); } }catch(_){ }</script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/app-router.js" defer></script>
  </head>
  <body>
    <svg style="display:none"><use href="/icons/sprites.svg#icon-mail"/></svg>
    <div id="app"></div>
    <script>
      (function() {
        try{
          var isDirectAccess = !document.referrer || window.history.length <= 1;
          var ts = 0; try{ ts = Number(sessionStorage.getItem('auth_checked_ts') || '0'); }catch(_){ }
          var recentlyChecked = ts && (Date.now() - ts) < 10000;
          if (recentlyChecked && !isDirectAccess){
            var s1 = document.createElement('script'); s1.type='module'; s1.src='/js/app.js'; document.body.appendChild(s1);
            try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm1=document.createElement('script'); sm1.type='module'; sm1.src='/js/app-mobile.js'; document.body.appendChild(sm1); } }catch(_){ }
            return;
          }
          if (isDirectAccess){
            try{
              var hasCookie = document.cookie.split(';').some(function(c){ return c.trim().indexOf('iding-session=') === 0; });
              if (hasCookie){
                const controller = new AbortController();
                const tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 3000);
                fetch('/api/session', { headers:{'Cache-Control':'no-cache'}, signal: controller.signal, credentials: 'include' })
                  .then(function(r){ clearTimeout(tid); if (!r || !r.ok) { try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } var s1=document.createElement('script'); s1.type='module'; s1.src='/js/app.js'; document.body.appendChild(s1); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } return; } return r.json(); })
                  .then(function(s){ if (!s) return; if (s.role === 'mailbox') { window.location.replace('/html/mailbox.html'); return; } try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } var s1=document.createElement('script'); s1.type='module'; s1.src='/js/app.js'; document.body.appendChild(s1); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } })
                  .catch(function(){ try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } var s1=document.createElement('script'); s1.type='module'; s1.src='/js/app.js'; document.body.appendChild(s1); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } });
                return;
              }
            }catch(_){ }
            var loadingDiv = document.createElement('div');
            loadingDiv.innerHTML = '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f7fbff 0%,#eef7ff 55%,#ffffff 100%);z-index:9999"><div style="text-align:center"><div style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,#33c3ff 0%,#0b6ff6 100%);border-radius:18px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:30px;box-shadow:0 16px 36px rgba(11,111,246,.25)">M</div><div style="width:40px;height:40px;border:3px solid rgba(11,111,246,.16);border-top:3px solid #0b6ff6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div></div>';
            document.body.appendChild(loadingDiv);
            const controller = new AbortController(); const tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 2500);
            fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' }, signal: controller.signal, credentials: 'include' })
              .then(function(r){ clearTimeout(tid); if (r && r.ok){ return r.json().then(function(s){ if (s && s.role === 'mailbox') { window.location.replace('/html/mailbox.html'); return null; } return s; }); } else { window.location.replace('/templates/loading.html?redirect=/'); return null; } })
              .then(function(s){ if (!s) return; try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } if (loadingDiv) loadingDiv.remove(); var s = document.createElement('script'); s.type = 'module'; s.src = '/js/app.js'; document.body.appendChild(s); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } })
              .catch(function(){ window.location.replace('/templates/loading.html?redirect=/'); });
          } else {
            var hasCookie = false; try{ hasCookie = document.cookie.split(';').some(function(c){ return c.trim().indexOf('iding-session=') === 0; }); }catch(_){ }
            const controller = new AbortController(); const tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 2000);
            fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' }, signal: controller.signal, credentials: 'include' })
              .then(function(r){ clearTimeout(tid); if (r && r.ok){ return r.json().then(function(s){ if (s && s.role === 'mailbox') { window.location.replace('/html/mailbox.html'); return null; } return s; }); } else { if (hasCookie) { try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } var s1 = document.createElement('script'); s1.type = 'module'; s1.src = '/js/app.js'; document.body.appendChild(s1); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } return null; } window.location.replace('/html/login.html'); return null; } })
              .then(function(s){ if (!s) return; try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } var s1 = document.createElement('script'); s1.type = 'module'; s1.src = '/js/app.js'; document.body.appendChild(s1); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } })
              .catch(function(){ if (hasCookie) { try{ sessionStorage.setItem('auth_checked','true'); sessionStorage.setItem('auth_checked_ts', String(Date.now())); }catch(_){ } var s1 = document.createElement('script'); s1.type = 'module'; s1.src = '/js/app.js'; document.body.appendChild(s1); try{ if (window.matchMedia && window.matchMedia('(max-width: 900px)').matches){ var sm=document.createElement('script'); sm.type='module'; sm.src='/js/app-mobile.js'; document.body.appendChild(sm); } }catch(_){ } } else { window.location.replace('/html/login.html'); } });
          }
        }catch(_){ window.location.replace('/templates/loading.html?redirect=/'); }
      })();
    </script>
  </body>
</html>
