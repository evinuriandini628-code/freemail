<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Masuk - MatMailer</title>
    <style>.precheck-hide body{ visibility: hidden; }</style>
    <script>
      (function(){
        try{
          var hasToken = document.cookie.split(';').some(function(c){ return c.trim().indexOf('iding-session=') === 0; });
          if (hasToken && document.referrer) {
            (async function(){
              try{
                const controller = new AbortController();
                const tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 1500);
                const r = await fetch('/api/session', { method: 'GET', headers: { 'Cache-Control': 'no-cache' }, credentials: 'include', signal: controller.signal });
                clearTimeout(tid);
                if (r && r.ok){ location.replace('/'); }
                else { document.cookie = 'iding-session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;'; }
              }catch(_){ }
            })();
            return;
          } else if (hasToken && !document.referrer) { location.replace('/'); return; }
          fetch('/api/session', { method: 'GET', headers: { 'Cache-Control': 'no-cache' }, credentials: 'include' }).then(function(r){ if (r && r.ok){ location.replace('/'); } }).catch(function(){});
        }catch(_){ }
      })();
    </script>
    <script src="/js/auth-guard.js"></script>
    <script>
      (function(){
        try{ document.documentElement.classList.add('precheck-hide'); }catch(_){ }
        try{
          var u = new URL(location.href);
          var fromLogout = (u.searchParams.get('from') === 'logout') || (sessionStorage.getItem('mf:just_logged_out') === '1');
          if (fromLogout){ sessionStorage.removeItem('mf:just_logged_out'); document.documentElement.classList.remove('precheck-hide'); return; }
        }catch(_){ }
        try{
          var controller = new AbortController();
          var tid = setTimeout(function(){ try{ controller.abort(); }catch(_){ } }, 1500);
          fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' }, signal: controller.signal, credentials: 'include' })
            .then(function(r){ clearTimeout(tid); if (r && r.ok){ location.replace('/'); return; } document.documentElement.classList.remove('precheck-hide'); })
            .catch(function(){ try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ } });
        }catch(_){ try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ } }
        setTimeout(function(){ try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ } }, 2000);
      })();
    </script>
    <script src="/js/mock.js"></script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="stylesheet" href="/css/matmailer-login.css" />
  </head>
  <body>
    <div class="bg"></div>
    <div class="center">
      <div class="card">
        <div class="logo"></div>
        <h1>Masuk ke MatMailer</h1>
        <div id="err" class="err"></div>
        <input id="username" class="input" type="text" placeholder="Masukkan username Anda" aria-label="Username" />
        <input id="pwd" class="input" type="password" placeholder="Masukkan kata sandi Anda" aria-label="Kata sandi" />
        <div style="font-size:12px;color:#64748b;margin-bottom:8px">Masuk sebagai administrator untuk mengelola mailbox dan inbox.</div>
        <button id="login" class="btn">Masuk</button>
      </div>
      <div class="matmailer-art" aria-hidden="true">
        <div class="letter"></div>
        <div class="envelope"></div>
        <div class="badge">Aman & Terlindungi<span>Email sementara Anda terjaga dengan aman.</span></div>
      </div>
    </div>
    <div class="login-footer">© 2026 MatMailer. Semua hak dilindungi.</div>
    <div id="toast" class="toast"></div>
    <script src="/js/toast-utils.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
