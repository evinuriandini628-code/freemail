<div class="mm-app">
  <header class="mm-header">
    <div class="mm-logo">M</div>
    <div class="mm-title">MatMailer</div>
    <div class="mm-user" id="role-badge"></div>
    <button id="logout" class="mm-logout">Keluar</button>
  </header>

  <main class="mm-container">
    <section class="mm-card">
      <h2>Mailbox Aktif</h2>
      <div id="email" class="mm-email">
        <span id="email-text">Belum ada mailbox</span>
      </div>

      <div id="email-actions" class="mm-actions" style="display:none">
        <button id="copy">Salin</button>
        <button id="refresh">Refresh</button>
        <button id="clear">Kosongkan</button>
      </div>

      <div class="mm-create">
        <select id="domain-select"></select>
        <input id="len-range" type="range" min="8" max="30" value="10" />
        <button id="gen">Buat Email</button>
      </div>
    </section>

    <section class="mm-card" id="list-card" style="display:none">
      <h2>Kotak Masuk</h2>
      <div id="list"></div>
    </section>
  </main>
</div>

<div id="toast"></div>
